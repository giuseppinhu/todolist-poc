<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow • To-do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-bg" aria-hidden="true">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
      <span class="grid"></span>
    </div>

    <main class="app-shell">
      <header class="hero glass">
        <div class="hero-copy">
          <p class="eyebrow">Workspace de produtividade</p>
          <h1>TaskFlow</h1>
          <p class="subtitle">Sua central de tarefas, com visual premium e fluxo inteligente.</p>
        </div>

        <div class="summary-card" aria-live="polite">
          <p>Progresso diário</p>
          <strong id="completionRate">0%</strong>
          <small id="summaryText">0 de 0 finalizadas</small>
        </div>
      </header>

      <section class="composer glass" aria-label="Adicionar nova tarefa">
        <form id="todoForm">
          <label class="sr-only" for="todoInput">Descrição da tarefa</label>
          <input
            id="todoInput"
            name="todoInput"
            type="text"
            maxlength="120"
            placeholder="Ex.: Fechar versão do projeto até às 16h"
            required
          />

          <label class="sr-only" for="todoPriority">Prioridade da tarefa</label>
          <select id="todoPriority" name="todoPriority" aria-label="Prioridade">
            <option value="high">Alta</option>
            <option value="medium" selected>Média</option>
            <option value="low">Baixa</option>
          </select>

          <button type="submit">Adicionar tarefa</button>
        </form>
      </section>

      <section class="toolbar glass" aria-label="Filtros e ações">
        <div class="filters" role="tablist" aria-label="Filtrar tarefas">
          <button class="filter-btn active" data-filter="all" role="tab">Todas</button>
          <button class="filter-btn" data-filter="pending" role="tab">Pendentes</button>
          <button class="filter-btn" data-filter="done" role="tab">Concluídas</button>
        </div>
        <button id="clearDone" class="ghost-btn" type="button">Limpar concluídas</button>
      </section>

      <section class="list-panel glass" aria-live="polite">
        <ul id="todoList" class="todo-list"></ul>
        <p id="emptyState" class="empty-state">
          Nenhuma tarefa por aqui — adicione a primeira e comece seu sprint. ✨
        </p>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <label class="check-wrap">
          <input class="todo-check" type="checkbox" />
          <span class="check-custom" aria-hidden="true"></span>
        </label>

        <div class="todo-content">
          <div class="todo-main-row">
            <p class="todo-title"></p>
            <span class="todo-priority"></span>
          </div>
          <small class="todo-date"></small>
        </div>

        <div class="todo-actions">
          <button class="icon-btn edit-btn" type="button" aria-label="Editar tarefa">✏️</button>
          <button class="icon-btn delete-btn" type="button" aria-label="Excluir tarefa">🗑️</button>
        </div>
      </li>
    </template>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
